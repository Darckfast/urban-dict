name = "urban-dict"
main = "./build/worker.mjs"
compatibility_date = "2024-04-15"
workers_dev = false
preview_urls = false
assets = { directory = "./public/" }

[vars]
VERCEL_GIT_REPO_SLUG = "urban"

[build]
command = "pnpm run build"
watch_dir = [ "pkg", "main.go"]

[observability.logs]
enabled = true
