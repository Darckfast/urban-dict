name = "urban-dict"
main = "./main.ts"
compatibility_date = "2024-04-15"
workers_dev = false
preview_urls = false

[vars]
SERVICE_NAME = "urban-dict"

[build]
command = "pnpm run build"
watch_dir = [ "pkg", "main.go"]

[observability.logs]
enabled = true

[[tail_consumers]]
service = "axiom-tail-worker"
