name = "urban-dict"
main = "bin/main.ts"
compatibility_date = "2026-05-26"
workers_dev = false
preview_urls = false
compatibility_flags = [ "nodejs_compat" ]

[build]
command = "go install codeberg.org/darckfast/workers-go/cmd/workers-go@latest && workers-go -i . -tiny"

[observability.logs]
enabled = true

[[tail_consumers]]
service = "axiom-tail-worker"
